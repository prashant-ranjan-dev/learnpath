spring:
  application:
    name: version1
  datasource:
    url: jdbc:postgresql://localhost:5432/LearnPath
    username: postgres
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  spring:
    ai:
      google:
        genai:
          api-key: ${GOOGLE_API_KEY}